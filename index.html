<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧞‍♂️</text></svg>">
    <title>Gift Genie</title>
    <link rel="stylesheet" href="style.css">
    <script defer type="module" src="index.js"></script>
</head>

<body class="bg-[#1a1625] text-white font-sans min-h-screen overflow-x-hidden">

    <div class="max-w-2xl mx-auto px-6 py-10 min-h-screen flex flex-col gap-8">

        <!-- Header -->
        <header class="text-center animate-fadeInDown">
            <div class="flex items-center justify-center gap-4">
                <img src="assets/genie.svg" alt="Genie" class="genie-icon-img w-14 h-14" />
                <h1 class="text-4xl font-extrabold tracking-tight text-white">Gift Genie</h1>
            </div>
        </header>

        <!-- Form -->
        <main class="flex flex-col gap-6">
            <form id="gift-form">
                <div class="w-full">
                    <textarea id="user-input"
                        class="w-full bg-transparent border-b-2 border-white/20 focus:border-amber-400 outline-none text-white placeholder-white/40 text-lg py-3 resize-none overflow-hidden transition-colors duration-300 leading-relaxed"
                        placeholder="e.g., My friend who loves coffee and sweet treats has a birthday coming up in 3 days. 40-60 bucks budget. I live in..."></textarea>
                </div>

                <!-- Lamp Button -->
                <div class="lamp-container flex flex-col items-center my-8">
                    <button type="submit" id="lamp-button"
                        class="lamp-btn flex flex-col items-center gap-4 bg-transparent border-none cursor-pointer outline-none"
                        aria-label="Rub the Lamp">
                        <span class="lamp-icon flex items-center justify-center">
                            <img src="assets/lamp.svg" alt="Magic Lamp" class="lamp-icon-img w-36 h-36" />
                        </span>
                        <span class="lamp-text text-amber-300/80 text-xl font-semibold">Rub the Lamp</span>
                    </button>
                </div>
            </form>

            <!-- Output -->
            <section class="pb-4">
                <div id="output-container" class="hidden opacity-0 transition-opacity duration-500">
                    <div id="output-content"
                        class="text-base leading-relaxed prose prose-invert prose-li:marker:text-amber-400 prose-headings:text-amber-400">
                    </div>
                </div>
            </section>
        </main>

    </div>

</body>

</html>
